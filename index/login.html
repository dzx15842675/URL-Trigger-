<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - URL Trigger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }
        .logo-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
        .logo h2 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .logo p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.3);
            transition: fill 0.2s;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s;
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .form-group input:focus + svg,
        .form-group input:focus ~ svg {
            fill: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .forgot-link {
            text-align: center;
            margin-top: 24px;
        }
        .forgot-link button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .forgot-link button:hover {
            color: #667eea;
        }
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        .modal h3 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 24px;
            text-align: center;
        }
        .modal input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .modal input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .modal-btns {
            display: flex;
            gap: 12px;
        }
        .modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-confirm:hover {
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }
        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .modal-error {
            color: #e74c3c;
            text-align: center;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .modal-error.show {
            display: block;
        }
        .modal-success {
            color: #2ecc71;
            text-align: center;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .modal-success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="bg-particles"></div>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M13 3L4 14h7l-2 7 9-11h-7l2-7z"/></svg>
                </div>
                <h2>URL Trigger</h2>
                <p>管理员后台登录</p>
            </div>
            <form method="POST" id="loginForm">
                <div class="form-group">
                    <label>账号</label>
                    <div class="input-wrapper">
                        <input type="text" name="username" value="admin" placeholder="请输入管理员账号" required>
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" placeholder="请输入密码" required>
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
                    </div>
                </div>
                <button type="submit" class="btn-login">登 录</button>
                <div id="errorMsg" class="error-msg"></div>
            </form>
            <div class="forgot-link">
                <button onclick="showForgot()">忘记密码？</button>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal-overlay">
        <div class="modal">
            <h3>验证备用密码</h3>
            <input type="password" id="backupPassword" placeholder="请输入备用密码">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="hideForgot()">取消</button>
                <button class="btn-confirm" onclick="verifyBackup()">验证</button>
            </div>
            <p id="backupError" class="modal-error">备用密码错误</p>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetModal" class="modal-overlay">
        <div class="modal">
            <h3>重置管理员密码</h3>
            <input type="password" id="newPassword" placeholder="输入新密码">
            <input type="password" id="confirmPassword" placeholder="确认新密码">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="hideReset()">取消</button>
                <button class="btn-confirm" onclick="resetPassword()">确认</button>
            </div>
            <p id="resetError" class="modal-error"></p>
            <p id="resetSuccess" class="modal-success">密码修改成功</p>
        </div>
    </div>

    <script>
        let resetToken = '';
        
        // Show error if exists (from server-side rendering)
        var errorMsg = "{{ error_message }}";
        if (errorMsg && errorMsg !== "None") {
            document.getElementById('errorMsg').textContent = errorMsg;
            document.getElementById('errorMsg').classList.add('show');
        }
        
        function showForgot() { document.getElementById('forgotModal').classList.add('show'); }
        function hideForgot() {
            document.getElementById('forgotModal').classList.remove('show');
            document.getElementById('backupError').classList.remove('show');
            document.getElementById('backupPassword').value = '';
        }
        function hideReset() {
            document.getElementById('resetModal').classList.remove('show');
            document.getElementById('resetError').classList.remove('show');
            document.getElementById('resetSuccess').classList.remove('show');
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }
        function verifyBackup() {
            fetch('/api/verify_backup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({backup_password: document.getElementById('backupPassword').value})
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    resetToken = d.reset_token;
                    hideForgot();
                    document.getElementById('resetModal').classList.add('show');
                } else {
                    document.getElementById('backupError').classList.add('show');
                }
            });
        }
        function resetPassword() {
            let np = document.getElementById('newPassword').value;
            let cp = document.getElementById('confirmPassword').value;
            let err = document.getElementById('resetError');
            let succ = document.getElementById('resetSuccess');
            err.classList.remove('show');
            succ.classList.remove('show');
            if (np !== cp) { err.textContent = '两次密码不一致'; err.classList.add('show'); return; }
            if (np.length < 4) { err.textContent = '密码长度不能少于4位'; err.classList.add('show'); return; }
            fetch('/api/reset_password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: resetToken, new_password: np})
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    succ.classList.add('show');
                    setTimeout(hideReset, 1500);
                } else {
                    err.textContent = '重置失败，请重试';
                    err.classList.add('show');
                }
            });
        }
    </script>
</body>
</html>
